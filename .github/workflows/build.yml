name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip and extract project
        run: |
          find . -name "*.zip" | head -1 | xargs unzip -o
          GRADLEW=$(find . -name "gradlew" | head -1)
          echo "Found gradlew at: $GRADLEW"
          PROJECT_DIR=$(dirname "$GRADLEW")
          echo "Project dir: $PROJECT_DIR"
          cp -r "$PROJECT_DIR"/. /tmp/project/
          cp -r /tmp/project/. ./

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JarvisAssistant-APK
          path: app/build/outputs/apk/debug/app-debug.apk
